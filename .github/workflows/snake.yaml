name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: DedicadoTech
         outputs: |
                  dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=2196F3&color_dots=0d1117,0d2137,1a3a5c,1565C0,2196F3
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
