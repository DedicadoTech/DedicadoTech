<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Toggle</title>
<link rel="stylesheet" href="language-toggle.css">
</head>
<body>
<div class="language-switcher">
<input type="checkbox" id="language-toggle" class="toggle-input">
<label for="language-toggle" class="toggle-label">
<span class="toggle-text left">PT-BR</span>
<span class="toggle-slider"></span>
<span class="toggle-text right">EN</span>
</label>
</div>
<script src="language-toggle.js"></script>
</body>
</html>
